<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hembruket</title>

<style>
body {
    margin: 0;
    font-family: Helvetica, sans-serif;
    background: #ffffff;
    color: #222;
}

header {
    text-align: center;
    padding: 80px 20px 40px;
}

h1 {
    margin: 0;
    font-size: 2.5rem;
}

p.subtitle {
    color: #777;
    margin-top: 10px;
}

section {
    max-width: 1100px;
    margin: auto;
    padding: 40px 20px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 20px;
}

.card {
    position: relative;
    overflow: hidden;
    border-radius: 12px;
    cursor: pointer;
}

.card img {
    width: 100%;
    height: 100%;
    display: block;
    transition: transform 0.4s ease;
}

.card:hover img {
    transform: scale(1.08);
}

.card-overlay {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 20px;
    background: linear-gradient(to top, rgba(0,0,0,0.7), transparent);
    color: white;
}

footer {
    text-align: center;
    padding: 40px 20px;
    background: #111;
    color: white;
    margin-top: 60px;
}
</style>

</head>
<body>

<header>
    <h1>Hembruket i Hemsjö</h1>
    <p class="subtitle">Smak | Näring | Lokalt</p>
    <br>
    <p class="subtitle">säljer till privatperson, butik och restaurang.</p>
</header>

<section>
    <div class="grid">

        <div class="card">
            <img src="images/projekt-1.jpg" alt="Amarant">
            <div class="card-overlay">
                <h3>Amarant</h3>
            </div>
        </div>

        <div class="card">
            <img src="images/projekt-2.jpg" alt="Rädisa">
            <div class="card-overlay">
                <h3>Rädisa</h3>
            </div>
        </div>

        <div class="card">
            <img src="images/projekt-3.jpg" alt="Solros">
            <div class="card-overlay">
                <h3>Solros</h3>
            </div>
        </div>

    </div>
    </section>

    <section>    
    <div class="grid">

        <div class="card">
            <img src="images/projekt-4.jpg" alt="Broccoli">
            <div class="card-overlay">
                <h3>Broccoli</h3>
            </div>
        </div>

        <div class="card">
            <img src="images/projekt-5.jpg" alt="Ärta">
            <div class="card-overlay">
                <h3>Ärta</h3>
            </div>
        </div>

        <div class="card">
            <img src="images/projekt-6.jpg" alt="Rödkål">
            <div class="card-overlay">
                <h3>Rödkål</h3>
            </div>
        </div>

    </div>
</section>

<footer>
    Mail: hemsjo.hembruket@gmail.com | Instagram: hembruket.i.hemsjo | Facebook: Hembruket
</footer>

</body>
</html>
